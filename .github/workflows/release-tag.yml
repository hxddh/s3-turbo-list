name: Release Tag

# Creates the annotated release tag and kicks off the release-assets build.
#
# Two triggers:
#  - workflow_dispatch: one manual dispatch releases the version prepared
#    on main (tag defaults to the Cargo.toml version).
#  - push to main touching Cargo.toml, and a schedule backstop:
#    release-on-version-bump, explicitly authorized by the maintainer.
#    When Cargo.toml's version has a matching CHANGELOG section but no tag
#    yet, the tag is created and the asset build is dispatched.
#    Idempotent — existing tags are a no-op, so both triggers are normally
#    no-ops.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g. v0.4.0); defaults to Cargo.toml version'
        required: false
      sha:
        description: 'Commit SHA to tag (defaults to main HEAD)'
        required: false
  push:
    branches: [main]
    paths: ['Cargo.toml']
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target commit and tag
        run: |
          TARGET="${{ inputs.sha }}"
          if [ -z "$TARGET" ]; then
            TARGET="$(git rev-parse HEAD)"
          fi
          git cat-file -e "${TARGET}^{commit}" || {
            echo "::error::Target commit ${TARGET} not found"
            exit 1
          }
          VERSION="$(git show "${TARGET}:Cargo.toml" | grep '^version' | head -1 | cut -d'"' -f2)"
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="v${VERSION}"
          fi
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "::error::tag '${TAG}' does not match Cargo.toml version '${VERSION}' at ${TARGET}"
            exit 1
          fi
          {
            echo "TARGET=${TARGET}"
            echo "TAG=${TAG}"
            echo "VERSION=${VERSION}"
          } >> "$GITHUB_ENV"

      - name: Skip when the tag already exists
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — nothing to do"
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Require a CHANGELOG section for the version
        if: env.SKIP != '1'
        run: |
          if ! git show "${TARGET}:CHANGELOG.md" | grep -q "^## \[${VERSION}\]"; then
            echo "CHANGELOG has no section for ${VERSION} — not releasing"
            echo "SKIP=1" >> "$GITHUB_ENV"
          fi

      - name: Create and push annotated tag
        if: env.SKIP != '1'
        run: |
          git -c user.name=github-actions -c user.email=github-actions@github.com \
            tag -a "$TAG" -m "Release $TAG" "$TARGET"
          git push origin "refs/tags/$TAG"
          echo "Created $TAG -> $TARGET"

      - name: Dispatch release-assets build
        if: env.SKIP != '1'
        run: |
          gh workflow run release-assets.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f tag="$TAG"
        env:
          GH_TOKEN: ${{ github.token }}
