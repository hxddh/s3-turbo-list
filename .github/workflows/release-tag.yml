name: Release Tag

# Creates an annotated release tag via workflow dispatch. Exists because
# managed development environments can push branches but not tags; the
# release checklist triggers this before release-assets.yml.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g. v0.3.0)'
        required: true
      sha:
        description: 'Commit SHA to tag (defaults to main HEAD)'
        required: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target commit
        run: |
          TARGET="${{ inputs.sha }}"
          if [ -z "$TARGET" ]; then
            TARGET="$(git rev-parse HEAD)"
          fi
          git cat-file -e "${TARGET}^{commit}" || {
            echo "::error::Target commit ${TARGET} not found"
            exit 1
          }
          echo "TARGET=${TARGET}" >> "$GITHUB_ENV"

      - name: Validate tag matches Cargo.toml version at target commit
        run: |
          VERSION="$(git show "${TARGET}:Cargo.toml" | grep '^version' | head -1 | cut -d'"' -f2)"
          EXPECTED_TAG="v${VERSION}"
          if [ "${{ inputs.tag }}" != "$EXPECTED_TAG" ]; then
            echo "::error::tag input '${{ inputs.tag }}' does not match Cargo.toml version '${VERSION}' (${EXPECTED_TAG}) at ${TARGET}"
            exit 1
          fi

      - name: Refuse to move an existing tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "::error::tag ${{ inputs.tag }} already exists on origin"
            exit 1
          fi

      - name: Create and push annotated tag
        run: |
          git -c user.name=github-actions -c user.email=github-actions@github.com \
            tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}" "$TARGET"
          git push origin "refs/tags/${{ inputs.tag }}"
          echo "Created ${{ inputs.tag }} -> ${TARGET}"
