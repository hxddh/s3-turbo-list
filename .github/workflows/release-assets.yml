name: Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build assets for'
        required: true
        default: 'v0.1.24'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: macos-aarch64
            runner: macos-15
          - platform: macos-x86_64
            runner: macos-15-intel

    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Derive release asset name
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          ASSET="s3-turbo-list-${VERSION}-${{ matrix.platform }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
          echo "asset=${ASSET}"

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo build --release
        run: cargo build --release

      - name: Rename and verify binary
        run: |
          cp target/release/s3-turbo-list "$ASSET"
          chmod +x "$ASSET"
          ./"$ASSET" --version
          ./"$ASSET" --help > help.txt

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform }}
          path: s3-turbo-list-*-${{ matrix.platform }}

  finalize:
    name: Finalize release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Ensure GitHub release exists
        run: |
          TAG="${{ inputs.tag }}"
          if gh release view "$TAG" --repo hxddh/s3-turbo-list >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --repo hxddh/s3-turbo-list \
              --verify-tag \
              --title "$TAG" \
              --notes "Release assets for $TAG"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Assemble flat asset directory
        run: |
          mkdir -p flat
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"

          # Collect all new binaries from the build matrix
          find artifacts -type f -name 's3-turbo-list-*' ! -name '*.sha256' -exec cp {} flat/ \;

          # Download existing linux-aarch64 asset from the release. On this
          # project the arm64 Linux asset is built on the Oracle arm host and
          # uploaded before this workflow fills in the remaining platforms.
          if ! gh release download "${{ inputs.tag }}" \
            --repo hxddh/s3-turbo-list \
            --dir flat \
            --pattern "s3-turbo-list-${VERSION}-linux-aarch64"; then
            echo "::error::Missing s3-turbo-list-${VERSION}-linux-aarch64. Build and upload the Oracle arm64 asset before finalizing release assets."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate complete asset set
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          expected=(
            "s3-turbo-list-${VERSION}-linux-aarch64"
            "s3-turbo-list-${VERSION}-linux-x86_64"
            "s3-turbo-list-${VERSION}-macos-aarch64"
            "s3-turbo-list-${VERSION}-macos-x86_64"
          )

          for asset in "${expected[@]}"; do
            if [ ! -s "flat/${asset}" ]; then
              echo "::error::Missing or empty release asset: ${asset}"
              exit 1
            fi
          done

          actual_count="$(find flat -maxdepth 1 -type f -name "s3-turbo-list-${VERSION}-*" | wc -l | tr -d ' ')"
          if [ "$actual_count" != "4" ]; then
            echo "::error::Expected exactly 4 platform binaries, found ${actual_count}"
            find flat -maxdepth 1 -type f -name "s3-turbo-list-${VERSION}-*" -print
            exit 1
          fi

      - name: Generate combined SHA256SUMS
        run: |
          cd flat
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          expected=(
            "s3-turbo-list-${VERSION}-linux-aarch64"
            "s3-turbo-list-${VERSION}-linux-x86_64"
            "s3-turbo-list-${VERSION}-macos-aarch64"
            "s3-turbo-list-${VERSION}-macos-x86_64"
          )
          sha256sum "${expected[@]}" > SHA256SUMS
          line_count="$(wc -l < SHA256SUMS | tr -d ' ')"
          if [ "$line_count" != "4" ]; then
            echo "::error::SHA256SUMS must contain exactly 4 entries, found ${line_count}"
            exit 1
          fi
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS
          echo "=== Verification ==="
          sha256sum -c SHA256SUMS
          ls -lh

      - name: List flat directory for debugging
        run: |
          echo "=== Flat directory contents ==="
          ls -lh flat/
          echo "=== SHA256SUMS content ==="
          cat flat/SHA256SUMS

      - name: Upload new assets to release
        run: |
          cd flat
          gh release upload "${{ inputs.tag }}" \
            s3-turbo-list-* \
            SHA256SUMS \
            --repo hxddh/s3-turbo-list \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: List release assets for audit
        run: |
          gh release view "${{ inputs.tag }}" \
            --repo hxddh/s3-turbo-list \
            --json assets \
            --jq '.assets[].name'
        env:
          GH_TOKEN: ${{ github.token }}
