name: Release Dispatch

# Lets environments that can push branches but cannot call the GitHub API
# trigger the release asset build: push a branch named
# dispatch/release-assets/<tag> and this workflow dispatches
# release-assets.yml for that tag, then deletes the dispatch branch.

on:
  push:
    branches:
      - 'dispatch/release-assets/**'

permissions:
  actions: write
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch release-assets for tag from branch name
        run: |
          REF="${GITHUB_REF#refs/heads/}"
          TAG="${REF#dispatch/release-assets/}"
          case "$TAG" in
            v[0-9]*) ;;
            *)
              echo "::error::branch suffix '${TAG}' does not look like a release tag"
              exit 1
              ;;
          esac
          echo "Dispatching release-assets.yml for tag ${TAG}"
          gh workflow run release-assets.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f tag="${TAG}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Delete dispatch branch
        if: always()
        run: |
          gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/${GITHUB_REF#refs/}" || true
        env:
          GH_TOKEN: ${{ github.token }}
